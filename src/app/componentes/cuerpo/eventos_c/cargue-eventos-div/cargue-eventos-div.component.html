<app-menu></app-menu>


<div class="cuerpo" ng-init="inicioAlgo()" >
    <div class="col-md-6">
        <form class="form-group row tamanio" #documentos_pdf="ngForm" autocomplete="off">
            <div class="row contenedor">

                <div class="col-md-6 ">
                    <h2 class="titulo">Formulario de Incidentes</h2>
                    <div class="radios">
                        <h3>Fechas</h3>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Numero Boletín División</label>
                            <input type="number" name="numero_boletin_div" id="numero_boletin_div"
                                placeholder="Numero Boletín División" class="form-control" ngModel>
                        </div>

                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Fecha del Evento</label>
                            <input type="date" name="fecha_evento" id="fecha_evento" class="form-control" ngModel>
                        </div>


                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Hora del Evento</label>
                            <input type="time" name="hora_evento" id="hora_evento" class="form-control" ngModel>
                        </div>
                        <h3>Unidades</h3>

                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Division</label>
                            <select name="divi_padre" id="divi_padre" class="form-control" [(ngModel)]="divi_padre"
                                (change)="div_hija(0,1)">
                                <option value=""></option>
                                <option [value]="item" *ngFor="let item of division">{{item}}</option>
                            </select>
                        </div>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Division FT</label>
                            <select name="divi_hija" id="divi_hija" class="form-control" [(ngModel)]="divi_hija"
                                (change)="brigadas(1,2)">
                                <option value="" selected></option>
                                <option [value]="item" *ngFor="let item of unidad_selecionada_div">{{item}}</option>
                            </select>
                        </div>

                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Brigadas</label>
                            <select name="brigada" id="brigada" class="form-control" [(ngModel)]="brigada"
                                (change)="batallones(2,3)">
                                <option value="" selected></option>
                                <option [value]="item" *ngFor="let item of unidad_selecionada_brigada">{{item}}</option>
                            </select>
                        </div>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Batallones</label>
                            <select name="batallon" id="batallon" class="form-control" [(ngModel)]="batallon">
                                <option value="" selected></option>
                                <option [value]="item" *ngFor="let item of unidad_selecionada_batallones">{{item}}
                                </option>
                            </select>
                        </div>
                        <h3>Amenaza</h3>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Amenaza</label>
                            <select name="amenaza" id="amenaza" class="form-control" [(ngModel)]="amenaza" (change)="acma()">
                                <option value="">---</option>
                                <option [value]="item" *ngFor="let item of amenaza_select">{{item}}</option>
                            </select>
                        </div>


                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Subestructura</label>
                            <input type="text" name="subestructura" id="subestructura" placeholder="Subestructura" class="form-control"
                                ngModel>
                        </div>

                        <h3>Ubicacion</h3>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Departamentos</label>
                            <select name="departamento" id="departamento" class="form-control" [(ngModel)]="departamento"
                                (change)="departamentos(4,5)">
                                <option value=""></option>
                                <option [value]="item" *ngFor="let item of departamentos_filtrados">{{item}}</option>
                            </select>
                        </div>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Municipios</label>
                            <select name="municipios" id="municipios" class="form-control" [(ngModel)]="municipios">
                                <option value=""></option>
                                <option [value]="item" *ngFor="let item of unidad_selecionada_municipios">{{item}}
                                </option>
                            </select>
                        </div>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Sitio</label>
                            <input type="text" name="sitio" id="sitio" placeholder="Sitio" class="form-control"
                                ngModel>
                        </div>
                        <h3>Coordenadas</h3>
                        <div class=" row col-md-11">
                            <div class="form-group col-md-2" style="margin: auto;">
                                <label for="">Latitud</label>
                                <select name="lati" id="lati" class="form-control" [(ngModel)]="lati"
                                    (ngModelChange)="coordenadas()">
                                    <option value=""></option>
                                    <option [value]="item" *ngFor="let item of lat">{{item}}
                                    </option>
                                </select>
                            </div>
                            <div class="form-group col-md-3" style="margin: auto;">
                                <label for="">Grados</label>
                                <input type="number" name="coodnadas_lat_gr" id="coodnadas_lat_gr" placeholder="GRD"
                                    class="form-control" [(ngModel)]="coodnadas_lat_gr" (ngModelChange)="coordenadas()">
                            </div>
                            <div class="form-group col-md-3" style="margin: auto;">
                                <label for="">Minutos</label>
                                <input type="number" name="coodnadas_lat_min" id="coodnadas_lat_min" placeholder="MIN"
                                    class="form-control" [(ngModel)]="coodnadas_lat_min"
                                    (ngModelChange)="coordenadas()">
                            </div>
                            <div class="form-group col-md-3" style="margin: auto;">
                                <label for="">Segundos</label>
                                <input type="number" name="coodnadas_lat_seg" id="coodnadas_lat_seg" placeholder="SEG"
                                    class="form-control" [(ngModel)]="coodnadas_lat_seg"
                                    (ngModelChange)="coordenadas()">
                            </div>
                        </div>
                        <div class=" row col-md-11">
                            <div class="form-group col-md-2" style="margin: auto;">
                                <label for="">Longitud</label>
                                <select name="loti" id="loti" class="form-control" [(ngModel)]="loti"
                                    (ngModelChange)="coordenadas()">
                                    <option value=""></option>
                                    <option [value]="item" *ngFor="let item of lot">{{item}}
                                    </option>
                                </select>
                            </div>
                            <div class="form-group col-md-3" style="margin: auto;">
                                <label for="">Grados</label>
                                <input type="number" name="coodnadas_lot_gr" id="coodnadas_lot_gr" placeholder="GRD"
                                    class="form-control" [(ngModel)]="coodnadas_lot_gr" (ngModelChange)="coordenadas()">
                            </div>
                            <div class="form-group col-md-3" style="margin: auto;">
                                <label for="">Minutos</label>
                                <input type="number" name="coodnadas_lot_min" id="coodnadas_lot_min" placeholder="MIN"
                                    class="form-control" [(ngModel)]="coodnadas_lot_min"
                                    (ngModelChange)="coordenadas()">
                            </div>
                            <div class="form-group col-md-3" style="margin: auto;">
                                <label for="">Segundos</label>
                                <input type="number" name="coodnadas_lot_seg" id="coodnadas_lot_seg" placeholder="SEG"
                                    class="form-control" [(ngModel)]="coodnadas_lot_seg"
                                    (ngModelChange)="coordenadas()">
                            </div>

                        </div>
                        <br>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <button class="btn btn-secondary form-control" (click)="graficar()">Graficar</button>
                        </div>

                        <h3>Evento</h3>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Evento</label>
                            <select name="evento" id="evento" class="form-control" ngModel>
                                <option value="">---</option>
                                <option [value]="item" *ngFor="let item of eventos">{{item}}
                                </option>
                            </select>
                        </div>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <label for="">Resumen</label>
                            <textarea name="resumen" id="resumen" cols="30" rows="10" class="form-control" ngModel></textarea>

                        </div>
                        <h3>Documentos</h3>
                        <div class=" row col-md-11">
                            <div class="form-group col-md-3" style="margin: auto;">
                                <label for="">Denuncia</label>
                                <select name="denuncia" id="denuncia" class="form-control" ngModel>
                                    <option value=""></option>
                                    <option value="SI">SI</option>
                                    <option value="NO">NO</option>

                                </select>
                            </div>
                            <div class="form-group col-md-8" style="margin: auto;">
                                <label for="">Numero Denuncia</label>
                                <input type="text" name="numero_de_denuncia" id="numero_de_denuncia" placeholder="numero_denuncia"
                                    class="form-control" [(ngModel)]="numero_denuncia">
                            </div>
                        </div>
                        <div class=" row col-md-11">
                            <div class="form-group col-md-5" style="margin: auto;">
                                <label for="">Fiscalia</label>
                                <input type="text" name="fiscalia" id="fiscalia" placeholder="Fiscalia"
                                    class="form-control" [(ngModel)]="fiscalia">
                            </div>
                            <div class="form-group col-md-5" style="margin: auto;">
                                <label for="">Estado</label>
                                <select name="estado" id="estado" class="form-control" ngModel>
                                    <option value=""></option>
                                    <option value="ACTIVA">ACTIVA</option>
                                    <option value="INACTIVA">INACTIVA</option>

                                </select>
                            </div>
                        </div>
                        <br>
                        <br>

                        <div class="form-group col-md-11" style="margin: auto;">

                            <div class="card">
                                <div class="card-body" (click)="cargar_boletin()" style="cursor: pointer;">
                                    Boletin.
                                </div>
                                <input required id="boletin_fisico" ngModel name="boletin_fisico" type="file" hidden
                                    (change)="leer_boletin($event)">
                                <div class="alert alert-success col-md-11" role="alert" *ngIf="inf_b" style="margin: auto !important;">
                                    {{inf_c_b}}!
                                </div>
                                <br *ngIf="inf_b">
                            </div>
                            
                        </div>

                        <br>

                        <div class="form-group col-md-11" style="margin: auto;">
                            <div class="card">
                                <div class="card-body" (click)="cargar_radiograma()" style="cursor: pointer;">
                                    Radiograma Interno.
                                </div>
                                <input required id="radiograma_unidad" ngModel name="radiograma_unidad" type="file"
                                    hidden (change)="leer_radiograma($event)">
                                <div class="alert alert-success col-md-11" role="alert" *ngIf="inf_r" style="margin: auto !important;">
                                    {{inf_c_r}}!
                                </div>
                                <br *ngIf="inf_r">
                            </div>
                            
                        </div>
                        <br>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <div class="card">
                                <div class="card-body" (click)="cargar_denuncia()" style="cursor: pointer;">
                                    Denuncia.
                                </div>
                                <input required id="denuncia_evento" ngModel name="denuncia_evento" type="file" hidden
                                    (change)="leer_denuncia($event)">
                                <div class="alert alert-success col-md-11" role="alert" *ngIf="inf_d" style="margin: auto !important;">
                                    {{inf_c_d}}!
                                </div>
                                <br *ngIf="inf_d">
                            </div>
                            
                        </div>
                        <br>
                        <div class="form-group col-md-11" style="margin: auto;">
                            <div class="card">
                                <div class="card-body" (click)="cargar_informe()" style="cursor: pointer;">
                                    Informe Cdte Batallon.
                                </div>
                                <input required id="informe_pdf" ngModel name="informe_pdf" type="file" hidden
                                    (change)="leer_informe($event)">
                                <div class="alert alert-success col-md-11" role="alert" *ngIf="inf_i" style="margin: auto !important;">
                                    {{inf_c_i}}!
                                </div>
                                <br *ngIf="inf_i">
                            </div>
                            
                        </div>

                        <br>
                        <br>
                        <hr>
                        <div class="alert alert-success col-md-11" role="alert" *ngIf="inf_g" style="margin: auto !important;">
                            {{inf_c_g}}!
                        </div>
                        <br *ngIf="inf_g">
                        <div class="alert alert-danger col-md-11" role="alert" *ngIf="inf_a" style="margin: auto !important;">
                            {{inf_c_g}}!
                        </div>
                        
                        <br *ngIf="inf_a">
                        <div class=" row col-md-10" style="margin: auto;" >
                            <button class="btn btn-primary" (click)="guardar_evento(documentos_pdf)" *ngIf="inf_btn">Cargar </button>
                            <button class="btn btn-success" (click)="clear()" *ngIf="inf_btnuew">Nuevo Evento </button>
                        </div>
                        <br>
                    </div>
                </div>
                <div class="col-md-6 ">
                    <h2 class="titulo">Mapa</h2>
                    <div class="radios">
                        <app-mapa-digital></app-mapa-digital>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<app-spiner></app-spiner>
