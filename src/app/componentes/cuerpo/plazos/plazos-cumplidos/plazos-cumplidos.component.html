<app-menu></app-menu>
<div class="contenedor">
  <div class="w-10">

    <!-- 🔍 Buscador -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
      <input
        type="text"
        class="form-control w-auto"
        placeholder="Buscar orden, responsable u observación..."
        [(ngModel)]="filtro"
      />

      <!-- 🔽 Selector de cantidad -->
      <div class="d-flex align-items-center mt-2 mt-md-0">
        <label class="me-2">Mostrar:</label>
        <select class="form-select w-auto" [(ngModel)]="pageSize" (change)="changePageSize(pageSize)">
          <option [ngValue]="10">10</option>
          <option [ngValue]="25">25</option>
          <option [ngValue]="50">50</option>
          <option [ngValue]="100">100</option>
        </select>
      </div>
    </div>

    <!-- 📋 Tabla -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover text-center">
        <thead class="table-dark">
          <tr>
            <th>Orden</th>
            <th>Responsable</th>
            <th>Observación</th>
            <th>Cumplido</th>
            <th>Descargas</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of paginatedPlazos">
            <td>{{ item[1] }}</td>
            <td>{{ item[2] }}</td>
            <td>{{ item[43] }}</td>
            <td>
              <span [class]="item[40] === 'SI' ? 'badge bg-success' : 'badge bg-danger'">
                {{ item[40] }}
              </span>
            </td>
           
  <td>
  <button class="btn btn-sm btn-primary" (click)="ver_documento(item[39])" *ngIf="item[41]?.includes('.pdf')">PDF</button>
  <button class="btn btn-sm btn-danger" (click)="downloadFile(item[39], item[41])" *ngIf="item[41]?.includes('.zip')">DESC.</button>
</td>
          </tr>
          <tr *ngIf="paginatedPlazos.length === 0">
            <td colspan="4">No se encontraron resultados</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 📌 Paginación -->
    <nav *ngIf="totalPages > 1">
      <ul class="pagination justify-content-center flex-wrap">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <button class="page-link" (click)="goToPage(currentPage - 1)">Anterior</button>
        </li>

        <li
          class="page-item"
          *ngFor="let p of pageArray"
          [class.active]="p === currentPage"
        >
          <button class="page-link" (click)="goToPage(p)">{{ p }}</button>
        </li>

        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <button class="page-link" (click)="goToPage(currentPage + 1)">Siguiente</button>
        </li>
      </ul>
    </nav>

  </div>
</div>
