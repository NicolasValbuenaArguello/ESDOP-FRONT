<!-- Navbar fija en la parte superior -->
<nav class="navbar navbar-expand-sm navbar-dark bg-dark fixed-top shadow-sm">
  <div class="container-fluid d-flex align-items-center">
    <!-- Foto de usuario -->
    <div class="navbar-brand d-flex align-items-center" id="foto" style="margin-left: 10px;">
      <img [src]="foto" alt="Foto" width="50" height="60" class="rounded border border-light" />
    </div>

    <!-- Nombre del usuario -->
    <span class="navbar-text ms-3 text-light fw-bold fs-4">
      {{ use }}
    </span>


    <!-- Espaciador flexible para alinear luna a la derecha -->
    <div class="flex-grow-1"></div>
        <!-- Nombre del usuario -->
             <!-- Texto de actualización -->
<div class="actualizacion-wrapper me-3 text-end">
  <span class="actualizacion-text text-light small fst-italic">
    <i class="bi bi-database-check me-1"></i> Resultados actualizados
  </span>
  <div class="tooltip-actualizacion">
    {{ actualizacionTexto }}
  </div>
</div>



    <!-- Icono de luna -->
    <div class="d-flex align-items-center me-3">
      <img [src]="'../../../../assets/lunas/' + luna" alt="Fase lunar" width="60" height="60" class="me-2" />
      <label class="text-light fw-semibold">{{ porcentaje_luna }}</label>
    </div>
  </div>
</nav>


<!-- Menú lateral -->
<nav class="menu" [class.menu-collapsed]="collapsed" id="menu">

  <!-- Menú principal -->
  <div class="menu-scroll">
    <ul>
      <!-- Botón hamburguesa -->
      <button class="hamburger-btn" (click)="toggleMenu()">☰</button>
      <ng-container *ngFor="let menu of menus">
        <li [class.has-submenu]="menu.subItems?.length" [class.active]="menu.activo" *ngIf="menu.permiso">
          <a class="menu-link" (click)="activarMenu(menu)">
            <i [class]="menu.icono" [class.icono-activo]="menu.activo"></i>
            <span class="menu-text">{{ menu.label }}</span>
          </a>

          <!-- Submenús -->
          <ul class="submenu" *ngIf="menu.activo && menu.subItems?.length">
            <ng-container *ngFor="let sub of menu.subItems">
              <li *ngIf="sub.permiso">
                <a [routerLink]="sub.route" routerLinkActive="sub-active" class="submenu-link"
                  [routerLinkActiveOptions]="{ exact: false }" #rla="routerLinkActive"
                  (click)="activarSubmenu(sub.route)">
                  <i [class]="sub.icono" [class.icono-sub-activo]="rla.isActive"></i>
                  {{ sub.label }}
                </a>
              </li>
            </ng-container>
          </ul>
        </li>
      </ng-container>
    </ul>
  </div>

  <!-- Botón de salir -->
  <div class="salir">
    <button class="btn-salir" (click)="salir()">
      ⏻ <span class="menu-text">Salir</span>
    </button>
  </div>
</nav>
